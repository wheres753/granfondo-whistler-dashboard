<style>
  :root{
    --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a;
    --accent:#3b82f6; --success:#22c55e; --warning:#f59e0b; --danger:#ef4444;
    --text:#f1f5f9; --text2:#94a3b8;
    --z1:#94a3b8; --z2:#3b82f6; --z3:#f59e0b; --z4:#f97316; --z5:#ef4444;
  }
  html,body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;margin:0;}
  *{scrollbar-width:thin;scrollbar-color:#2a2d3a #0f1117;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:8px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:0.85rem;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  .btn{border-radius:0.55rem;font-weight:600;transition:all .15s;}
  .btn-primary{background:var(--accent);color:white;}
  .btn-primary:hover{background:#2563eb;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .tab-active{color:var(--text);border-bottom:2px solid var(--accent);}
  input,select,textarea{background:#0f1117;border:1px solid var(--border);color:var(--text);border-radius:0.5rem;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
  input[type=range]{accent-color:var(--accent);}
  .fade-in{animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .modal-in{animation:slideup .25s ease;}
  @keyframes slideup{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
</style>

// fractions of maxHR that reproduce the spec table at maxHR=194
const ZONE_FRAC = { z1:0.597, z2:0.701, z3:0.799, z4:0.897 };
function zoneBounds(maxHR){
  const z1Max=Math.round(ZONE_FRAC.z1*maxHR), z2Max=Math.round(ZONE_FRAC.z2*maxHR),
        z3Max=Math.round(ZONE_FRAC.z3*maxHR), z4Max=Math.round(ZONE_FRAC.z4*maxHR);
  return {
    z1:{lo:0,hi:z1Max}, z2:{lo:z1Max+1,hi:z2Max}, z3:{lo:z2Max+1,hi:z3Max},
    z4:{lo:z3Max+1,hi:z4Max}, z5:{lo:z4Max+1,hi:260}
  };
}
function zoneRangeLabel(zone,maxHR){
  const b=zoneBounds(maxHR)[zone];
  if(zone==="z1") return "<"+(b.hi+1);
  if(zone==="z5") return (b.lo)+"+";
  return b.lo+"–"+b.hi;
}
function zoneForHR(hr,maxHR){
  const b=zoneBounds(maxHR);
  for(const z of ["z1","z2","z3","z4","z5"]) if(hr>=b[z].lo && hr<=b[z].hi) return z;
  return "z2";
}

/* --------- day builders --------- */
function gymDay(n,session){
  let ex,title,dur;
  if(n<=5){ex=GYM_P1;title="Gym — Foundation Session "+session;dur=50;}
  else if(n<=11){ex=GYM_P2;title="Gym — Load Session "+session;dur=55;}
  else {ex=GYM_TAPER;title="Gym — Taper (light)";dur=40;}
  return {type:"gym",title,durationMin:dur,exercises:ex,
    notes:gymWeightNote[n]+(session===2?" Same movements as Tuesday — but this is your primary, heavier session of the week. Focus on feeling the right muscles working.":" Progression rule: only add weight when you complete all reps with perfect form two sessions in a row.")};
}
function soccerDay(){return {type:"soccer",title:"Soccer",durationMin:90,
  notes:"Play normally — high-intensity cross-training. Pre-soccer: 20–30 min easy spin warm-up at the work gym if time allows."};}
function spinDay(n){const s=SPIN[n];return {type:"spin",title:s[0],durationMin:s[1],structure:s[2]};}
function fridaySpin(){return {type:"spin",title:FRIDAY_SPIN[0],durationMin:FRIDAY_SPIN[1],structure:FRIDAY_SPIN[2]};}
function mtbDay(n){const m=MTB[n];return {type:"mtb",title:"MTB — Long Ride",durationMin:m[0],targetHR:m[1],
  notes:m[2],fuelReminder:m[0]>120};}
function hikeDay(){return {type:"hike",title:"Hike / Active Recovery",durationMin:120,
  notes:"Keep it fun. Not a training session — just movement and enjoyment. Protect this lifestyle; don't overtrain."};}
function restDay(extra,title){return {type:"rest",title:title||"Rest or Easy Walk",durationMin:0,
  notes:extra||"Optional 30–45 min walk. No training stress today. Recovery is where adaptation happens."};}
function tueComboDay(n){
  const gym=gymDay(n,1), soccer=soccerDay();
  return {
    type:"combo", title:"Strength + Soccer",
    durationMin:gym.durationMin+soccer.durationMin,
    sessions:[
      {...gym, title:"Gym — Strength (lighter, pre-soccer)",
        notes:"Your lighter strength touch for the week — the heavier session is Thursday. Lift controlled and leave something in the legs for soccer. "+gymWeightNote[n]},
      {...soccer, title:"Soccer",
        notes:"Play normally — high-intensity cross-training. Warm up with 10–15 min easy spin before you lift, then soccer later in the day."}
    ],
    notes:"Two sessions today — your gym + soccer day. Order: easy spin warm-up → strength (controlled) → soccer later. If your legs are cooked, prioritise soccer and back off the weights. This is a hard day, so Monday and Friday stay easy."
  };
}
function fridayActive(n){
  const build = n>=7 && n<=11;
  return {type:"rest",
    title: build?"Active Recovery (optional easy ride)":"Active Recovery",

    notes: build
      ? "You're at the other office today — no gym/spin bike. Optional easy 30–45 min Z2 outdoor ride or brisk walk if you have access (this replaces the build-phase second spin; keep it genuinely easy, cadence-focused). Otherwise just rest and walk."
      : "You're at the other office today — no gym. Rest or an easy 30–45 min walk / Z1 active recovery. No training stress."};
}

function makeWeek(n){
  if(n===13) return week13();
  const d={};
  d.monday=restDay("Rest day — you're at the other office (no gym), and this is your full recovery day. An easy walk is fine, but nothing structured. Adaptation happens when you rest.","Rest Day");
  d.tuesday=(n===12)?soccerDay():tueComboDay(n);   // week 12 taper: soccer only, single light lift Thursday
  d.wednesday=spinDay(n);
  d.thursday=gymDay(n,2);                            // main strength (week 12 -> taper light session)
  d.friday=fridayActive(n);
  d.saturday=mtbDay(n);
  d.sunday=hikeDay();
  return d;
}

/* ============================== HELPERS ============================== */
function uid(){return "a-"+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);}
function parseDate(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function fmtISO(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function addDays(s,n){const d=parseDate(s);d.setDate(d.getDate()+n);return fmtISO(d);}
function todayISO(){return fmtISO(new Date());}
function fmtShort(s){const d=parseDate(s);return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function weekStart(n){return addDays(WEEK1_MONDAY,(n-1)*7);}
function weekEnd(n){return addDays(WEEK1_MONDAY,(n-1)*7+6);}
function dayDate(week,dayIdx){return addDays(WEEK1_MONDAY,(week-1)*7+dayIdx);}
function getCurrentWeek(){
  const diff=Math.floor((parseDate(todayISO())-parseDate(WEEK1_MONDAY))/(864e5));
  return Math.min(13,Math.max(1,Math.floor(diff/7)+1));
}
function todayDayIdx(){return (new Date().getDay()+6)%7;}
function phaseOf(n){return n<=5?"Base":n<=10?"Build":"Sharpen";}
function phaseColor(n){return n<=5?"#3b82f6":n<=10?"#f97316":"#22c55e";}
function daysUntilRace(){return Math.max(0,Math.floor((parseDate(ATHLETE.raceDate)-parseDate(todayISO()))/(864e5)));}
function fmtHrs(min){const h=Math.floor(min/60),m=Math.round(min%60);return h>0?(h+"h"+(m?" "+m+"m":"")):(m+"m");}
function weekPrescribedMin(n){return Object.values(workoutLibrary[n]).reduce((s,w)=>s+(w.durationMin||0),0);}

function zoneMinutes(act){
  // returns {z1..z5} minutes for an activity
  const out={z1:0,z2:0,z3:0,z4:0,z5:0};
  const dur=act.durationMinutes||0;
  if(act.zoneDistribution){
    for(const z of ["z1","z2","z3","z4","z5"]) out[z]=dur*(act.zoneDistribution[z]||0)/100;
  } else if(act.avgHR){
    out[zoneForHR(act.avgHR,ATHLETE.maxHR)]=dur;
  } else {
    out.z2=dur; // unknown -> assume aerobic
  }
  return out;
}
function activitiesInWeek(acts,n){
  const s=weekStart(n),e=weekEnd(n);
  return acts.filter(a=>a.date>=s&&a.date<=e);
}

/* ============================== STORAGE HOOK ============================== */
function useStored(key,initial){
  const [val,setVal]=useState(()=>{
    try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):initial;}catch(e){return initial;}
  });
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}},[key,val]);
  return [val,setVal];
}

/* ============================== APP ============================== */
function App(){
  const [tab,setTab]=useState("overview");
  const [activities,setActivities]=useStored("activities",[]);
  const [milestones,setMilestones]=useStored("milestones",{});
  const [weeklyNotes,setWeeklyNotes]=useStored("weekly-notes",{});
  const [completed,setCompleted]=useStored("completed-workouts",{});
  const [gearStatus,setGearStatus]=useStored("gear-status",{});
  const [raceCheck,setRaceCheck]=useStored("race-checklist",{});
  const [settings,setSettings]=useStored("settings",{name:ATHLETE.name,weightKg:ATHLETE.weightKg,maxHR:ATHLETE.maxHR,onboarded:false});
  const [showSettings,setShowSettings]=useState(false);
  const [showOnboard,setShowOnboard]=useState(!settings.onboarded);
  const [dayModal,setDayModal]=useState(null); // {week,dayIdx}

  // keep maxHR in sync for zone calcs
  ATHLETE.maxHR=settings.maxHR||194; ATHLETE.name=settings.name||"Athlete";

  const week=getCurrentWeek();

  function addActivity(a){setActivities(prev=>[{...a,id:uid()},...prev]);}
  function deleteActivity(id){setActivities(prev=>prev.filter(a=>a.id!==id));}

  function markComplete(wk,dayIdx){
    const key=wk+"-"+DAY_NAMES[dayIdx];
    const w=workoutLibrary[wk][DAY_NAMES[dayIdx]];
    const wasDone=completed[key];
    setCompleted(prev=>({...prev,[key]:!prev[key]}));
    if(!wasDone && w.type!=="rest" && w.durationMin>0){
      const sessions=w.sessions||[w]; // combo days log one activity per session
      sessions.forEach(s=>{
        if(!s.durationMin) return;
        let zd=null;
        if(s.structure){
          const tot=s.structure.reduce((a,x)=>a+x.durationMin,0);
          zd={z1:0,z2:0,z3:0,z4:0,z5:0};
          s.structure.forEach(x=>zd[x.zone]+=100*x.durationMin/tot);
          Object.keys(zd).forEach(k=>zd[k]=Math.round(zd[k]));
        } else if(s.type==="mtb"){
          zd= wk>=7&&wk<=11 ? {z1:5,z2:72,z3:13,z4:10,z5:0} : {z1:10,z2:83,z3:5,z4:2,z5:0};
        }
        addActivity({date:dayDate(wk,dayIdx),type:KEY_TO_LOGTYPE[s.type]||"Other",durationMinutes:s.durationMin,
          distanceKm:null,elevationM:null,avgHR:null,maxHR:null,perceivedEffort:5,
          zoneDistribution:zd,fromStrava:false,notes:"Marked complete from plan.",
          completedPlanWorkout:"Week "+wk+" "+DAY_SHORT[dayIdx]+" "+(TYPE_LABEL[s.type]||s.type)});
      });
    }
  }

  const tabs=[
    {id:"overview",label:"Overview",icon:"dashboard"},
    {id:"plan",label:"Training Plan",icon:"calendar"},
    {id:"log",label:"Log Activity",icon:"activity"},
    {id:"progress",label:"Progress",icon:"trending"},
    {id:"race",label:"Race Day",icon:"flag"},
    {id:"gear",label:"Gear & Nutrition",icon:"bag"},
  ];

  return <div className="min-h-screen pb-16">
    {/* NAV */}
    <header className="sticky top-0 z-40 backdrop-blur" style={{background:"rgba(15,17,23,.92)",borderBottom:"1px solid var(--border)"}}>
      <div className="max-w-6xl mx-auto px-4">
        <div className="flex items-center justify-between py-3">
          <div className="flex items-center gap-2.5">
            <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{background:"var(--accent)"}}>
              <Icon name="bike" size={20} color="#fff"/>
            </div>
            <div>
              <div className="font-bold leading-tight">GranFondo Whistler</div>
              <div className="text-xs" style={{color:"var(--text2)"}}>{daysUntilRace()} days out · Week {week} · {phaseOf(week)}</div>
            </div>
          </div>
          <button onClick={()=>setShowSettings(true)} className="btn btn-outline p-2"><Icon name="settings" size={18}/></button>
        </div>
        <nav className="flex gap-1 overflow-x-auto -mb-px">
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)}
            className={"flex items-center gap-1.5 px-3 py-2.5 text-sm font-medium whitespace-nowrap "+(tab===t.id?"tab-active":"")}
            style={{color:tab===t.id?"var(--text)":"var(--text2)"}}>
            <Icon name={t.icon} size={16}/>{t.label}
          </button>)}
        </nav>
      </div>
    </header>

    <main className="max-w-6xl mx-auto px-4 pt-6 fade-in" key={tab}>
      {tab==="overview" && <Overview {...{week,activities,settings,weeklyNotes,setTab,setDayModal}}/>}
      {tab==="plan" && <Plan {...{week,completed,setDayModal}}/>}
      {tab==="log" && <LogActivity {...{addActivity,activities,deleteActivity,settings}}/>}
      {tab==="progress" && <Progress {...{activities,milestones,setMilestones,weeklyNotes,setWeeklyNotes,week,settings}}/>}
      {tab==="race" && <RaceDay {...{raceCheck,setRaceCheck}}/>}
      {tab==="gear" && <GearNutrition {...{gearStatus,setGearStatus}}/>}
    </main>

    {dayModal && <WorkoutModal {...dayModal} completed={completed} onClose={()=>setDayModal(null)}
      onComplete={()=>markComplete(dayModal.week,dayModal.dayIdx)} maxHR={settings.maxHR}/>}
    {showSettings && <SettingsModal {...{settings,setSettings,activities,onClose:()=>setShowSettings(false)}}/>}
    {showOnboard && <Onboard onClose={()=>{setSettings(s=>({...s,onboarded:true}));setShowOnboard(false);}}/>}
  </div>;
}

/* ============================== OVERVIEW ============================== */
function Overview({week,activities,settings,weeklyNotes,setTab,setDayModal}){
  const dayIdx=todayDayIdx();
  const today=workoutLibrary[week][DAY_NAMES[dayIdx]];
  const wkActs=activitiesInWeek(activities,week);
  const loggedMin=wkActs.reduce((s,a)=>s+(a.durationMinutes||0),0);
  const targetMin=weekPrescribedMin(week);
  const pct=Math.min(100,Math.round(loggedMin/targetMin*100||0));
  const totalMin=activities.reduce((s,a)=>s+(a.durationMinutes||0),0);
  const rides=activities.filter(a=>a.type==="MTB"||a.type==="Spin Bike");
  const longest=rides.reduce((m,a)=>Math.max(m,a.durationMinutes||0),0);
  // week zone pie
  const zsum={z1:0,z2:0,z3:0,z4:0,z5:0};
  wkActs.forEach(a=>{const zm=zoneMinutes(a);for(const z in zm)zsum[z]+=zm[z];});
  const zTot=Object.values(zsum).reduce((a,b)=>a+b,0);
  const pieData=Object.keys(zsum).filter(z=>zsum[z]>0).map(z=>({name:z.toUpperCase(),value:zsum[z],z}));
  // last activity reminder
  const lastDate=activities.length?activities.map(a=>a.date).sort().slice(-1)[0]:null;
  const gap=lastDate?Math.floor((parseDate(todayISO())-parseDate(lastDate))/(864e5)):null;
  const eighty=zTot>0?Math.round((zsum.z1+zsum.z2)/zTot*100):null;

  return <div className="space-y-5">
    {activities.length>0 && gap>=3 &&
      <div className="card p-3 flex items-center gap-2 text-sm" style={{borderColor:"var(--warning)",background:"#f59e0b14"}}>
        <Icon name="alert" size={18} color="var(--warning)"/>
        <span>You haven't logged an activity in {gap} days — stay on track!</span>
      </div>}

    {/* HERO */}
    <div className="card p-6" style={{background:"linear-gradient(135deg,#1a1d27,#171a2e)"}}>
      <div className="grid md:grid-cols-3 gap-6">
        <div className="md:col-span-1">
          <div className="text-xs uppercase tracking-wide" style={{color:"var(--text2)"}}>Countdown</div>
          <div className="text-5xl font-extrabold mono" style={{color:"var(--accent)"}}>{daysUntilRace()}</div>
          <div className="text-sm" style={{color:"var(--text2)"}}>days until GranFondo Whistler</div>
          <div className="mt-3 flex gap-2">
            <span className="text-xs px-2 py-1 rounded-md" style={{background:"#3b82f622",color:"var(--accent)"}}>Week {week} of 13</span>
            <span className="text-xs px-2 py-1 rounded-md" style={{background:phaseColor(week)+"22",color:phaseColor(week)}}>{phaseOf(week)} phase</span>
          </div>
        </div>
        <div className="md:col-span-2">
          <div className="flex items-center justify-between mb-1">
            <span className="text-sm font-medium">Weekly training load</span>
            <span className="text-sm mono" style={{color:"var(--text2)"}}>{fmtHrs(loggedMin)} / {fmtHrs(targetMin)} target</span>
          </div>
          <div className="w-full h-3 rounded-full overflow-hidden" style={{background:"#0f1117"}}>
            <div className="h-full rounded-full transition-all" style={{width:pct+"%",background:pct>=100?"var(--success)":"var(--accent)"}}/>
          </div>
          <div className="text-xs mt-1" style={{color:"var(--text2)"}}>{pct}% of this week's prescribed hours logged</div>

          <div className="mt-4 card p-4 cursor-pointer hover:border-blue-500 transition" style={{background:"#0f1117"}}
            onClick={()=>setDayModal({week,dayIdx})}>
            <div className="text-xs uppercase tracking-wide" style={{color:"var(--text2)"}}>Today · {DAY_SHORT[dayIdx]}</div>
            <div className="flex items-center justify-between mt-1">
              <div className="flex items-center gap-2">
                <span className="text-lg">{TYPE_EMOJI[today.type]}</span>
                <span className="font-bold">{today.title}</span>
              </div>
              <div className="flex items-center gap-2 text-sm" style={{color:"var(--text2)"}}>
                {today.durationMin>0 && <span className="mono">{fmtHrs(today.durationMin)}</span>}
                <Icon name="chevron" size={16}/>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    {/* QUICK STATS */}
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <Stat icon="clock" label="Total hours logged" value={fmtHrs(totalMin)} sub={activities.length+" activities"}/>
      <Stat icon="mountain" label="Longest ride" value={longest?fmtHrs(longest):"—"} sub="spin or MTB"/>
      <Stat icon="flag" label="Weeks remaining" value={Math.max(0,13-week)} sub={"of 13"}/>
      <div className="card p-4">
        <div className="text-xs" style={{color:"var(--text2)"}}>Zone mix this week</div>
        {zTot>0?
          <div className="flex items-center gap-2 mt-1">
            <ResponsiveContainer width={64} height={64}>
              <PieChart><Pie data={pieData} dataKey="value" innerRadius={16} outerRadius={30} paddingAngle={1}>
                {pieData.map((e,i)=><Cell key={i} fill={ZONE_COLORS[e.z]}/>)}
              </Pie></PieChart>
            </ResponsiveContainer>
            <div className="text-xs leading-tight">
              {eighty!==null && <div className="font-bold text-base" style={{color:eighty>=80?"var(--success)":eighty>=70?"var(--warning)":"var(--danger)"}}>{eighty}%</div>}
              <div style={{color:"var(--text2)"}}>in Z1–Z2</div>
            </div>
          </div>
          : <div className="text-sm mt-2" style={{color:"var(--text2)"}}>No data yet this week</div>}
      </div>
    </div>

    {/* COACH NOTE */}
    <div className="card p-5" style={{borderColor:"var(--accent)"}}>
      <div className="flex items-center gap-2 mb-1">
        <Icon name="flame" size={18} color="var(--accent)"/>
        <span className="font-bold">Coach's note — Week {week}</span>
      </div>
      <p style={{color:"var(--text)"}}>{coachNotes[week]}</p>
    </div>

    {week>=11 && <div className="card p-4 text-sm" style={{borderColor:"var(--warning)"}}>
      <span className="font-semibold" style={{color:"var(--warning)"}}>Taper mode:</span> Trust the process. Cut volume, keep intensity, sleep more, eat more carbs. The fitness is already in the bank.
    </div>}
  </div>;
}
function Stat({icon,label,value,sub}){
  return <div className="card p-4">
    <div className="flex items-center gap-2 text-xs" style={{color:"var(--text2)"}}><Icon name={icon} size={14}/>{label}</div>
    <div className="text-2xl font-bold mono mt-1">{value}</div>
    <div className="text-xs" style={{color:"var(--text2)"}}>{sub}</div>
  </div>;
}

}

/* ============================== LOG ACTIVITY ============================== */
function LogActivity({addActivity,activities,deleteActivity,settings}){
  const blank={date:todayISO(),type:"MTB",hours:1,minutes:0,distanceKm:"",elevationM:"",avgHR:"",maxHR:"",
    perceivedEffort:6,useZones:false,z1:0,z2:70,z3:15,z4:15,z5:0,notes:"",fromStrava:false};
  const [f,setF]=useState(blank);
  const zoneSum=f.z1+f.z2+f.z3+f.z4+f.z5;
  const dur=f.hours*60+Number(f.minutes);
  function submit(){
    if(dur<=0){alert("Add a duration.");return;}
    if(f.useZones && zoneSum!==100){alert("Zone percentages must sum to 100 (currently "+zoneSum+").");return;}
    addActivity({
      date:f.date,type:f.type,durationMinutes:dur,
      distanceKm:f.distanceKm===""?null:Number(f.distanceKm),
      elevationM:f.elevationM===""?null:Number(f.elevationM),
      avgHR:f.avgHR===""?null:Number(f.avgHR),
      maxHR:f.maxHR===""?null:Number(f.maxHR),
      perceivedEffort:f.perceivedEffort,
      zoneDistribution:f.useZones?{z1:f.z1,z2:f.z2,z3:f.z3,z4:f.z4,z5:f.z5}:null,
      fromStrava:f.fromStrava,notes:f.notes,completedPlanWorkout:null
    });
    setF({...blank,date:f.date});
  }
  const up=(k,v)=>setF(p=>({...p,[k]:v}));
  const recent=activities.slice(0,7);
  return <div className="grid lg:grid-cols-3 gap-5">
    <div className="lg:col-span-2 space-y-4">
      <Card>
        <h2 className="text-lg font-bold mb-3 flex items-center gap-2"><Icon name="plus" size={18}/>Log an activity</h2>
        <div className="grid sm:grid-cols-2 gap-3">
          <Field label="Date"><input type="date" value={f.date} onChange={e=>up("date",e.target.value)} className="w-full px-3 py-2"/></Field>
          <Field label="Activity type"><select value={f.type} onChange={e=>up("type",e.target.value)} className="w-full px-3 py-2">
            {LOG_TYPES.map(t=><option key={t}>{t}</option>)}</select></Field>
          <Field label="Duration">
            <div className="flex gap-2">
              <input type="number" min="0" value={f.hours} onChange={e=>up("hours",Number(e.target.value))} className="w-full px-3 py-2" placeholder="h"/>
              <span className="self-center text-xs" style={{color:"var(--text2)"}}>h</span>
              <input type="number" min="0" max="59" value={f.minutes} onChange={e=>up("minutes",Number(e.target.value))} className="w-full px-3 py-2" placeholder="m"/>
              <span className="self-center text-xs" style={{color:"var(--text2)"}}>m</span>
            </div>
          </Field>
          <Field label="Distance (km, optional)"><input type="number" value={f.distanceKm} onChange={e=>up("distanceKm",e.target.value)} className="w-full px-3 py-2"/></Field>
          <Field label="Elevation (m, optional)"><input type="number" value={f.elevationM} onChange={e=>up("elevationM",e.target.value)} className="w-full px-3 py-2"/></Field>
          <Field label="Average HR (bpm)"><input type="number" value={f.avgHR} onChange={e=>up("avgHR",e.target.value)} className="w-full px-3 py-2"/></Field>
          <Field label="Max HR (bpm)"><input type="number" value={f.maxHR} onChange={e=>up("maxHR",e.target.value)} className="w-full px-3 py-2"/></Field>
          <Field label={"Perceived effort: "+f.perceivedEffort+"/10"}>
            <input type="range" min="1" max="10" value={f.perceivedEffort} onChange={e=>up("perceivedEffort",Number(e.target.value))} className="w-full"/>
          </Field>
        </div>

        <div className="mt-3">
          <label className="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" checked={f.useZones} onChange={e=>up("useZones",e.target.checked)}/>
            Enter HR zone distribution (from Strava)
          </label>
          {f.useZones && <div className="mt-2 p-3 rounded-lg space-y-2" style={{background:"#0f1117"}}>
            {["z1","z2","z3","z4","z5"].map(z=>
              <div key={z} className="flex items-center gap-2">
                <span className="text-xs w-7 font-semibold" style={{color:ZONE_COLORS[z]}}>{z.toUpperCase()}</span>
                <input type="range" min="0" max="100" value={f[z]} onChange={e=>up(z,Number(e.target.value))} className="flex-1"/>
                <span className="mono text-xs w-9 text-right">{f[z]}%</span>
              </div>)}
            <div className="text-xs text-right mono" style={{color:zoneSum===100?"var(--success)":"var(--danger)"}}>Sum: {zoneSum}% {zoneSum===100?"✓":"(must = 100)"}</div>
          </div>}
        </div>

        <Field label="Notes" className="mt-3"><textarea rows="2" value={f.notes} onChange={e=>up("notes",e.target.value)} className="w-full px-3 py-2" placeholder="Fromme upper. Felt strong on the climbs..."/></Field>
        <label className="flex items-center gap-2 text-sm mt-2 cursor-pointer">
          <input type="checkbox" checked={f.fromStrava} onChange={e=>up("fromStrava",e.target.checked)}/> Pulled from Strava
        </label>
        <button onClick={submit} className="btn btn-primary w-full mt-3 py-2.5">Save activity</button>
      </Card>

      <Card>
        <h3 className="font-bold mb-2">Recent activity</h3>
        {recent.length===0?<p className="text-sm" style={{color:"var(--text2)"}}>Nothing logged yet.</p>:
          <div className="overflow-x-auto"><table className="w-full text-sm">
            <thead><tr style={{color:"var(--text2)"}} className="text-xs text-left">
              <th className="p-1.5">Date</th><th className="p-1.5">Type</th><th className="p-1.5">Time</th>
              <th className="p-1.5">Avg HR</th><th className="p-1.5">RPE</th><th className="p-1.5">Notes</th><th></th>
            </tr></thead>
            <tbody>{recent.map(a=><tr key={a.id} style={{borderTop:"1px solid var(--border)"}}>
              <td className="p-1.5 mono whitespace-nowrap">{fmtShort(a.date)}</td>
              <td className="p-1.5"><span className="px-1.5 py-0.5 rounded text-xs" style={{background:TYPE_COLORS[LOGTYPE_TO_KEY[a.type]]+"33"}}>{a.type}</span></td>
              <td className="p-1.5 mono">{fmtHrs(a.durationMinutes)}</td>
              <td className="p-1.5 mono">{a.avgHR||"—"}</td>
              <td className="p-1.5 mono">{a.perceivedEffort||"—"}</td>
              <td className="p-1.5 max-w-[160px] truncate" style={{color:"var(--text2)"}}>{a.notes}</td>
              <td className="p-1.5"><button onClick={()=>deleteActivity(a.id)} style={{color:"var(--text2)"}}><Icon name="x" size={14}/></button></td>
            </tr>)}</tbody>
          </table></div>}
      </Card>
    </div>

    <div className="space-y-4">
      <div className="card p-4" style={{borderColor:"var(--accent)"}}>
        <div className="flex items-center gap-2 font-semibold mb-1"><Icon name="heart" size={16} color="var(--accent)"/>Strava import</div>
        <p className="text-sm" style={{color:"var(--text2)"}}>After each ride, open Strava → tap the activity → scroll to <b style={{color:"var(--text)"}}>Heart Rate Zones</b>. Enter the zone % breakdown above. Your Garmin syncs automatically to Strava — this takes 30 seconds.</p>
      </div>
      <div className="card p-4">
        <div className="font-semibold mb-2 text-sm">HR Zones (max {settings.maxHR})</div>
        {["z1","z2","z3","z4","z5"].map(z=><div key={z} className="flex items-center justify-between py-1 text-sm">
          <span className="flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full" style={{background:ZONE_COLORS[z]}}/>{z.toUpperCase()} {ZONE_NAMES[z]}</span>
          <span className="mono" style={{color:"var(--text2)"}}>{zoneRangeLabel(z,settings.maxHR)}</span>
        </div>)}
      </div>
    </div>
  </div>;
}
function Field({label,children,className=""}){
  return <label className={"block "+className}><span className="text-xs font-medium" style={{color:"var(--text2)"}}>{label}</span><div className="mt-1">{children}</div></label>;

/* ============================== PROGRESS ============================== */
function Progress({activities,milestones,setMilestones,weeklyNotes,setWeeklyNotes,week,settings}){
  const tt=darkTooltip();
  // weekly load
  const loadData=Array.from({length:13},(_,i)=>{
    const n=i+1;const acts=activitiesInWeek(activities,n);
    const logged=acts.reduce((s,a)=>s+(a.durationMinutes||0),0)/60;
    return {week:"W"+n,n,logged:+logged.toFixed(1),target:+(weekPrescribedMin(n)/60).toFixed(1),future:n>week};
  });
  // zone stacked
  const zoneData=loadData.map(d=>{
    const acts=activitiesInWeek(activities,d.n);const z={z1:0,z2:0,z3:0,z4:0,z5:0};
    acts.forEach(a=>{const zm=zoneMinutes(a);for(const k in zm)z[k]+=zm[k]/60;});
    return {week:d.week,...Object.fromEntries(Object.entries(z).map(([k,v])=>[k,+v.toFixed(2)]))};
  });
  // activity type donut last 4 weeks
  const cutoff=addDays(todayISO(),-28);
  const typeAgg={};
  activities.filter(a=>a.date>=cutoff).forEach(a=>{typeAgg[a.type]=(typeAgg[a.type]||0)+(a.durationMinutes||0)/60;});
  const donut=Object.entries(typeAgg).map(([k,v])=>({name:k,value:+v.toFixed(1),key:LOGTYPE_TO_KEY[k]}));
  // longest ride trend (Saturdays / MTB)
  const longRides=activities.filter(a=>a.type==="MTB").slice().sort((a,b)=>a.date<b.date?-1:1)
    .map(a=>({date:fmtShort(a.date),hours:+(a.durationMinutes/60).toFixed(1)}));
  // HR trend by type
  const hrActs=activities.filter(a=>a.avgHR).slice().sort((a,b)=>a.date<b.date?-1:1);
  const hrData=hrActs.map(a=>({date:fmtShort(a.date),type:a.type,avgHR:a.avgHR}));

  const MILES=[
    {id:"m1",label:"Completed first 3-hour MTB at Z2"},
    {id:"m2",label:"First 2×20 min threshold session"},
    {id:"m3",label:"First 4-hour ride"},
    {id:"m4",label:"Practiced fueling every 30 min on a long ride"},
    {id:"m5",label:"Completed 5-hour MTB ride"},
    {id:"m6",label:"Did a pre-race road bike ride"},
    {id:"m7",label:"Completed race week taper"},
  ];
  const curNote=weeklyNotes[week]||"";

  return <div className="space-y-5">
    <div className="grid lg:grid-cols-2 gap-5">
      <Card>
        <h3 className="font-bold mb-1">Weekly load vs. target</h3>
        <p className="text-xs mb-2" style={{color:"var(--text2)"}}>Bars = hours logged · line = plan target</p>
        <ResponsiveContainer width="100%" height={240}>
          <BarChart data={loadData}>
            <CartesianGrid stroke="#2a2d3a" vertical={false}/>
            <XAxis dataKey="week" tick={{fill:"#94a3b8",fontSize:11}}/>
            <YAxis tick={{fill:"#94a3b8",fontSize:11}} unit="h"/>
            <Tooltip {...tt}/>
            <Bar dataKey="logged" radius={[4,4,0,0]}>
              {loadData.map((d,i)=><Cell key={i} fill={d.future?"#2a2d3a":phaseColor(d.n)} fillOpacity={d.future?0.4:1}/>)}
            </Bar>
            <Line dataKey="target" stroke="#f1f5f9" strokeWidth={2} dot={false} type="monotone"/>
          </BarChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <h3 className="font-bold mb-1">HR zone distribution</h3>
        <p className="text-xs mb-2" style={{color:"var(--text2)"}}>Goal: Z1+Z2 ≥ 80%. Watch creeping Z3.</p>
        <ResponsiveContainer width="100%" height={240}>
          <BarChart data={zoneData}>
            <CartesianGrid stroke="#2a2d3a" vertical={false}/>
            <XAxis dataKey="week" tick={{fill:"#94a3b8",fontSize:11}}/>
            <YAxis tick={{fill:"#94a3b8",fontSize:11}} unit="h"/>
            <Tooltip {...tt}/>
            {["z1","z2","z3","z4","z5"].map(z=><Bar key={z} dataKey={z} stackId="a" fill={ZONE_COLORS[z]}/>)}
          </BarChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <h3 className="font-bold mb-1">Activity mix — last 4 weeks</h3>
        {donut.length?<ResponsiveContainer width="100%" height={240}>
          <PieChart>
            <Pie data={donut} dataKey="value" nameKey="name" innerRadius={50} outerRadius={85} paddingAngle={2}>
              {donut.map((e,i)=><Cell key={i} fill={TYPE_COLORS[e.key]||"#64748b"}/>)}
            </Pie>
            <Tooltip {...tt}/><Legend wrapperStyle={{fontSize:12}}/>
          </PieChart>
        </ResponsiveContainer>:<Empty/>}
      </Card>

      <Card>
        <h3 className="font-bold mb-1">Longest ride trend (MTB)</h3>
        {longRides.length?<ResponsiveContainer width="100%" height={240}>
          <LineChart data={longRides}>
            <CartesianGrid stroke="#2a2d3a"/>
            <XAxis dataKey="date" tick={{fill:"#94a3b8",fontSize:11}}/>
            <YAxis tick={{fill:"#94a3b8",fontSize:11}} unit="h"/>
            <Tooltip {...tt}/>
            <Line dataKey="hours" stroke="#22c55e" strokeWidth={2.5} type="monotone" dot={{r:3}}/>
          </LineChart>
        </ResponsiveContainer>:<Empty/>}
      </Card>
    </div>

    <Card>
      <h3 className="font-bold mb-1">Heart rate trend</h3>
      <p className="text-xs mb-2" style={{color:"var(--text2)"}}>As fitness builds, avg HR for the same effort should drift down — the clearest sign of progress.</p>
      {hrData.length?<ResponsiveContainer width="100%" height={240}>
        <LineChart data={hrData}>
          <CartesianGrid stroke="#2a2d3a"/>
          <XAxis dataKey="date" tick={{fill:"#94a3b8",fontSize:11}}/>
          <YAxis tick={{fill:"#94a3b8",fontSize:11}} domain={["auto","auto"]} unit=" bpm" width={64}/>
          <Tooltip {...tt}/>
          <Line dataKey="avgHR" stroke="#ef4444" strokeWidth={2} type="monotone" dot={{r:3}}/>
          <ReferenceLine y={136} stroke="#3b82f6" strokeDasharray="4 4" label={{value:"Z2 top",fill:"#3b82f6",fontSize:10}}/>
        </LineChart>
      </ResponsiveContainer>:<Empty msg="Log activities with an average HR to see this."/>}
    </Card>

    <div className="grid lg:grid-cols-2 gap-5">
      <Card>
        <h3 className="font-bold mb-3 flex items-center gap-2"><Icon name="trophy" size={18} color="var(--warning)"/>Fitness milestones</h3>
        <div className="space-y-2">{MILES.map(m=>
          <label key={m.id} className="flex items-center gap-3 cursor-pointer p-2 rounded-lg hover:bg-white/5">
            <input type="checkbox" checked={!!milestones[m.id]} onChange={()=>setMilestones(p=>({...p,[m.id]:!p[m.id]}))} className="w-4 h-4"/>
            <span className={milestones[m.id]?"line-through":""} style={{color:milestones[m.id]?"var(--text2)":"var(--text)"}}>{m.label}</span>
          </label>)}</div>
      </Card>

      <Card>
        <h3 className="font-bold mb-2">Weekly check-in — Week {week}</h3>
        <textarea rows="3" value={curNote} onChange={e=>setWeeklyNotes(p=>({...p,[week]:e.target.value}))}
          className="w-full px-3 py-2 text-sm" placeholder="How did the week feel? Energy, soreness, motivation..."/>
        <div className="mt-3 space-y-2 max-h-48 overflow-y-auto">
          {Object.keys(weeklyNotes).filter(k=>weeklyNotes[k]).sort((a,b)=>b-a).map(k=>
            <div key={k} className="text-sm p-2 rounded-lg" style={{background:"#0f1117"}}>
              <span className="text-xs font-semibold" style={{color:phaseColor(+k)}}>Week {k}</span>
              <p style={{color:"var(--text2)"}}>{weeklyNotes[k]}</p>
            </div>)}
        </div>
      </Card>
    </div>
  </div>;
}
function Empty({msg="No data yet — log some activities."}){return <div className="h-[240px] flex items-center justify-center text-sm" style={{color:"var(--text2)"}}>{msg}</div>;}

/* ============================== RACE DAY ============================== */
function RaceDay({raceCheck,setRaceCheck}){
  const [goal,setGoal]=useState("3:55");

  const goalHrs=goalMin/60;
  const flatKm=70,climbKm=52;
  const Vf=(flatKm+climbKm/0.75)/goalHrs; // flat speed
  const Vc=Vf*0.75;
  const flatTime=flatKm/Vf*60, climbTime=climbKm/Vc*60;
  const avg=ATHLETE.raceDistanceKm/goalHrs;

  const CHECK=[
    "Wake up by 4:00 AM","Eat big breakfast by 4:15 AM (oatmeal + banana + PB + coffee)",
    "Pack 6–8 gels in jersey pockets","Electrolyte tabs / powder",
    "Helmet, gloves, sunglasses","Chamois cream (if first time in road shorts)",
    "Lights (mandatory before dawn)","Arrive Stanley Park by 6:00 AM for 7:00 AM start"];

  // fueling timeline markers
  const eatMarks=[];for(let t=30;t<=goalMin;t+=30)eatMarks.push(t);
  const drinkMarks=[];for(let t=60;t<=goalMin;t+=60)drinkMarks.push(t);

  return <div className="space-y-5">
    <div className="card p-6 text-center" style={{background:"linear-gradient(135deg,#1a1d27,#2a1620)",borderColor:"var(--danger)"}}>
      <div className="text-xs uppercase tracking-widest" style={{color:"var(--danger)"}}>Race Briefing</div>
      <h2 className="text-2xl font-extrabold mt-1">RBC GranFondo Whistler</h2>
      <div className="text-sm" style={{color:"var(--text2)"}}>Sept 12, 2026 · 122 km · ~2,300 m · Target sub-4:00 (30.5 km/h avg)</div>
    </div>

    {/* Elevation profile */}
    <Card>
      <h3 className="font-bold mb-3">Course profile</h3>
      <ElevationProfile/>
      <div className="grid sm:grid-cols-2 gap-3 mt-4 text-sm">
        <div className="p-3 rounded-lg" style={{background:"#3b82f614"}}>
          <span className="font-semibold" style={{color:"var(--accent)"}}>0–70 km · Stanley Park → Squamish</span>
          <p style={{color:"var(--text2)"}}>Mostly flat with rolling hills. Furry Creek & Britannia climbs (~10 min each). Fresh legs — <b style={{color:"var(--danger)"}}>this is where people blow up. Hold back.</b></p>
        </div>
        <div className="p-3 rounded-lg" style={{background:"#ef444414"}}>
          <span className="font-semibold" style={{color:"var(--danger)"}}>70–122 km · Squamish → Whistler</span>
          <p style={{color:"var(--text2)"}}>Real climbing — long sustained ascent into the coastal mountains. This is where your training shows up. Sit, spin, breathe.</p>
        </div>
      </div>
    </Card>

    <div className="grid lg:grid-cols-2 gap-5">
      {/* Pacing calculator */}
      <Card>
        <h3 className="font-bold mb-3 flex items-center gap-2"><Icon name="clock" size={18}/>Pacing calculator</h3>
        <Field label="Goal finish time (h:mm)">
          <input value={goal} onChange={e=>setGoal(e.target.value)} className="w-full px-3 py-2 mono" placeholder="3:55"/>
        </Field>
        <div className="grid grid-cols-2 gap-3 mt-3">
          <Metric label="Overall avg speed" value={avg.toFixed(1)+" km/h"}/>
          <Metric label="Flat section pace" value={Vf.toFixed(1)+" km/h"} sub="km 0–70"/>
          <Metric label="Climbing pace" value={Vc.toFixed(1)+" km/h"} sub="km 70–122 (~25% slower)"/>
          <Metric label="Split: flat / climb" value={fmtHrs(flatTime)+" / "+fmtHrs(climbTime)}/>
        </div>
        <p className="text-xs mt-3" style={{color:"var(--text2)"}}>Calculator applies a 25% speed penalty to the climbing half. Find a draft group at your flat pace — it's worth 15–20 min over 122 km.</p>
      </Card>

      {/* Fueling timeline */}
      <Card>
        <h3 className="font-bold mb-3 flex items-center gap-2"><Icon name="flame" size={18} color="var(--warning)"/>Fueling timeline</h3>
        <div className="relative h-2 rounded-full mb-8 mt-6" style={{background:"#0f1117"}}>
          <div className="absolute inset-0 rounded-full" style={{background:"linear-gradient(90deg,#3b82f6,#ef4444)",opacity:.5}}/>
          {eatMarks.map(t=><div key={"e"+t} className="absolute -top-5 text-[10px]" style={{left:(t/goalMin*100)+"%",transform:"translateX(-50%)"}}>
            <span title={"Eat at "+fmtHrs(t)}>🍌</span></div>)}
          {drinkMarks.map(t=><div key={"d"+t} className="absolute -bottom-6 text-[10px]" style={{left:(t/goalMin*100)+"%",transform:"translateX(-50%)"}}>
            <span title={"Drink at "+fmtHrs(t)}>💧</span></div>)}
          <div className="absolute -bottom-6 left-0 text-[10px] mono" style={{color:"var(--text2)"}}>0:00</div>
          <div className="absolute -bottom-6 right-0 text-[10px] mono" style={{color:"var(--text2)"}}>{fmtHrs(goalMin)}</div>
        </div>
        <ul className="text-sm space-y-1 mt-6" style={{color:"var(--text2)"}}>
          <li>🍌 <b style={{color:"var(--text)"}}>Every 30 min</b> — 1 gel / banana (~30 g carbs). Start at 0:30 regardless of hunger.</li>
          <li>💧 <b style={{color:"var(--text)"}}>Every hour</b> — 500–750 ml fluid + electrolytes (all 5 rest stops).</li>
          <li>🎯 Target 60–80 g carbs/hr = ~240–320 g over 4 hours.</li>
          <li>🛑 <b style={{color:"var(--text)"}}>Km 70 (Squamish):</b> eat something substantial — only the climbing begins now.</li>
        </ul>
      </Card>
    </div>

    <div className="grid lg:grid-cols-2 gap-5">
      <Card>
        <h3 className="font-bold mb-3">Morning-of checklist</h3>
        <div className="space-y-1.5">{CHECK.map((c,i)=>
          <label key={i} className="flex items-center gap-3 cursor-pointer p-1.5 rounded-lg hover:bg-white/5">
            <input type="checkbox" checked={!!raceCheck[i]} onChange={()=>setRaceCheck(p=>({...p,[i]:!p[i]}))} className="w-4 h-4"/>
            <span className={raceCheck[i]?"line-through text-sm":"text-sm"} style={{color:raceCheck[i]?"var(--text2)":"var(--text)"}}>{c}</span>
          </label>)}</div>
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Wave start & pacing rules</h3>
        <ul className="text-sm space-y-2" style={{color:"var(--text2)"}}>
          <li><b style={{color:"var(--text)"}}>Self-seed:</b> riders seed by expected finish. With a 4-hr goal, seed front-middle.</li>
          <li><b style={{color:"var(--text)"}}>First 30 km:</b> HR stays Z2 (116–136). It should feel too easy. That is correct.</li>
          <li><b style={{color:"var(--text)"}}>Climbs:</b> drop to a comfortable Z3–Z4, spin a light gear with MTB instincts. Do NOT stand and grind — sit, spin, breathe.</li>
          <li><b style={{color:"var(--text)"}}>Last 20 km:</b> if you paced right, you'll have something left. Now you can push.</li>
          <li><b style={{color:"var(--text)"}}>Bike:</b> get on a road bike once before race day — clip-in pedals, drop-bar brakes, higher seat. Rent from Cap's, Simon's, or The Path.</li>
        </ul>
      </Card>
    </div>
  </div>;
}
function Metric({label,value,sub}){
  return <div className="p-3 rounded-lg" style={{background:"#0f1117"}}>
    <div className="text-xs" style={{color:"var(--text2)"}}>{label}</div>
    <div className="text-lg font-bold mono">{value}</div>
    {sub && <div className="text-[10px]" style={{color:"var(--text2)"}}>{sub}</div>}
  </div>;
}
function ElevationProfile(){
  // stylised: flat-ish first 70km w/ 2 bumps, big climb to end. x 0..1000, y up=low value
  const pts="0,180 80,175 160,150 200,160 260,135 320,165 420,170 500,168 560,172 620,160 700,150 780,110 860,70 940,40 1000,30";
  const land=[
    {x:30,label:"Stanley Park",km:"0"},{x:90,label:"Lions Gate",km:"5"},
    {x:200,label:"Furry Creek",km:"35"},{x:300,label:"Britannia",km:"48"},
    {x:620,label:"Squamish",km:"70"},{x:1000,label:"Whistler",km:"122"}];
  const rest=[120,300,500,700,900];
  return <div className="w-full overflow-x-auto">
    <svg viewBox="0 0 1000 240" className="w-full" style={{minWidth:560}}>
      <defs><linearGradient id="elev" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.5"/><stop offset="100%" stopColor="#3b82f6" stopOpacity="0.05"/>
      </linearGradient></defs>
      <polygon points={"0,210 "+pts+" 1000,210"} fill="url(#elev)"/>
      <polyline points={pts} fill="none" stroke="#3b82f6" strokeWidth="2.5"/>
      <line x1="0" y1="210" x2="1000" y2="210" stroke="#2a2d3a"/>
      {rest.map((x,i)=><text key={i} x={x} y="205" fontSize="14" textAnchor="middle">⛽</text>)}
      {land.map((l,i)=><g key={i}>
        <line x1={l.x} y1="210" x2={l.x} y2="222" stroke="#94a3b8"/>
        <text x={l.x} y="234" fontSize="11" fill="#94a3b8" textAnchor={i===0?"start":i===land.length-1?"end":"middle"}>{l.label}</text>
      </g>)}
      <text x="640" y="120" fontSize="12" fill="#ef4444" fontWeight="bold">⬆ climbing</text>
      <text x="200" y="120" fontSize="12" fill="#3b82f6">flat · hold back</text>
    </svg>
  </div>;
}

/* ============================== GEAR & NUTRITION ============================== */
function GearNutrition({gearStatus,setGearStatus}){
  const [sub,setSub]=useState("gear");
  return <div>
    <div className="flex gap-2 mb-4">
      {["gear","nutrition"].map(s=><button key={s} onClick={()=>setSub(s)}
        className={"btn px-4 py-2 capitalize "+(sub===s?"btn-primary":"btn-outline")}>{s}</button>)}
    </div>
    {sub==="gear"?<Gear {...{gearStatus,setGearStatus}}/>:<Nutrition/>}
  </div>;
}
function Gear({gearStatus,setGearStatus}){
  const items=[
    {id:"garmin",name:"Garmin Forerunner 265",price:"$450",cat:"buy",note:"Best value: multisport, wrist HR, Strava sync, training load, VO2 max, AMOLED."},
    {id:"hrm",name:"Garmin HRM-Pro Plus chest strap",price:"$130",cat:"buy",note:"More accurate than wrist HR, especially on the spin bike. Pairs with the 265."},
    {id:"strava",name:"Strava subscription",price:"$12/mo",cat:"buy",note:"Needed for Training Zones, Relative Effort, Fitness Score. Auto-syncs from Garmin Connect."},
    {id:"roadbike",name:"Road bike (rent/borrow)",price:"~$200/wk",cat:"borrow",note:"1 week before. Cap's Bikes, Simon's, or The Path."},
    {id:"shorts",name:"Padded cycling shorts (chamois)",price:"$80",cat:"buy",note:"Non-negotiable for 4 hrs in the saddle."},
    {id:"jersey",name:"Cycling jersey w/ rear pockets",price:"$70",cat:"buy",note:"For gels & food."},
    {id:"helmet",name:"Helmet",price:"have",cat:"have",note:"Mandatory — you likely have one from MTB."},
    {id:"glasses",name:"Sunglasses",price:"$40",cat:"have",note:"Eye protection + glare."},
    {id:"gloves",name:"Cycling gloves",price:"$30",cat:"borrow",note:"Optional but helps on a road bike."},
  ];
  const STATUS=["have","buy","borrow"];
  const SC={have:"var(--success)",buy:"var(--accent)",borrow:"var(--warning)"};
  return <div className="grid lg:grid-cols-3 gap-5">
    <div className="lg:col-span-2 space-y-3">
      <h3 className="font-bold">Equipment checklist</h3>
      {items.map(it=>{const st=gearStatus[it.id]||it.cat;return(
        <div key={it.id} className="card p-3 flex items-center justify-between gap-3">
          <div>
            <div className="font-semibold text-sm">{it.name}</div>
            <div className="text-xs" style={{color:"var(--text2)"}}>{it.note}</div>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            <span className="text-xs mono" style={{color:"var(--text2)"}}>{it.price}</span>
            <div className="flex rounded-lg overflow-hidden" style={{border:"1px solid var(--border)"}}>
              {STATUS.map(s=><button key={s} onClick={()=>setGearStatus(p=>({...p,[it.id]:s}))}
                className="text-[11px] px-2 py-1 capitalize" style={{background:st===s?SC[s]:"transparent",color:st===s?"#0f1117":"var(--text2)",fontWeight:st===s?700:400}}>{s}</button>)}
            </div>
          </div>
        </div>);})}
    </div>
    <div className="space-y-4">
      <div className="card p-4">
        <h3 className="font-bold mb-2 text-sm flex items-center gap-2"><Icon name="bag" size={16}/>Buy-now total</h3>
        <div className="text-sm space-y-1" style={{color:"var(--text2)"}}>
          <div className="flex justify-between"><span>Forerunner 265</span><span className="mono">$450</span></div>
          <div className="flex justify-between"><span>HRM-Pro Plus</span><span className="mono">$130</span></div>
          <div className="flex justify-between"><span>Strava (3 mo)</span><span className="mono">$36</span></div>
          <div className="flex justify-between"><span>Shorts + jersey</span><span className="mono">$150</span></div>
          <div className="flex justify-between font-bold pt-1" style={{color:"var(--text)",borderTop:"1px solid var(--border)"}}><span>≈ Total</span><span className="mono">$766 CAD</span></div>
        </div>
      </div>
      <a href="Gym-Exercise-Guide.pdf" className="card p-4 block" style={{borderColor:"#a855f7"}}>
        <h3 className="font-bold mb-1 text-sm flex items-center gap-2" style={{color:"#a855f7"}}><Icon name="dumbbell" size={16} color="#a855f7"/>Gym Exercise Guide (PDF)</h3>
        <p className="text-xs" style={{color:"var(--text2)"}}>Never lifted before? Plain-English how-to for all 13 exercises in your plan — what each is, step-by-step, form cues, and a demo video search.</p>
        <div className="btn w-full mt-2 py-2 text-center text-sm flex items-center justify-center gap-2" style={{background:"#a855f7",color:"#fff"}}><Icon name="download" size={15} color="#fff"/>Download the guide</div>
      </a>
      <div className="card p-4" style={{borderColor:"var(--accent)"}}>
        <h3 className="font-bold mb-1 text-sm">Garmin setup</h3>
        <ol className="text-xs space-y-1 list-decimal pl-4" style={{color:"var(--text2)"}}>
          <li>Garmin Connect → User Settings → Heart Rate Zones.</li>
          <li>Set Max HR = 194 (or your tested value).</li>
          <li>Choose "% Max HR" zones — match the Z1–Z5 ranges in this app.</li>
          <li>Connect → Strava under Connected Apps. Rides now sync automatically.</li>
        </ol>
      </div>
    </div>
  </div>;
}
function Nutrition(){
  const fuel=[
    ["SiS Gel","22 g","Easy on stomach, no water needed"],
    ["Maurten 100","25 g","Premium, very gut-friendly"],
    ["GU Energy Gel","22 g","Widely available"],
    ["Banana (medium)","27 g","At rest stops, real food"],
    ["Medjool date (2 pcs)","36 g","DIY, cheap, tasty"],
    ["Rice cake (homemade)","~30 g","Best for long rides"],
  ];
  return <div className="grid lg:grid-cols-2 gap-5">
    <Card>
      <h3 className="font-bold mb-2 flex items-center gap-2"><Icon name="utensils" size={18}/>Pre-ride meals</h3>
      <ul className="text-sm space-y-2" style={{color:"var(--text2)"}}>
        <li><b style={{color:"var(--text)"}}>Race morning (3 hrs before):</b> oatmeal + banana + peanut butter + coffee (~80–100 g carbs).</li>
        <li><b style={{color:"var(--text)"}}>Long-ride morning:</b> toast + honey + banana, or oats. Eat 90 min before.</li>
        <li><b style={{color:"var(--text)"}}>Race week Wed–Fri:</b> more carbs than usual. Big carb meal Friday night (pasta, rice, potatoes).</li>
      </ul>
    </Card>
    <Card>
      <h3 className="font-bold mb-2">On-bike fuel options</h3>
      <table className="w-full text-sm">
        <thead><tr className="text-xs text-left" style={{color:"var(--text2)"}}><th className="p-1.5">Product</th><th className="p-1.5">Carbs</th><th className="p-1.5">Notes</th></tr></thead>
        <tbody>{fuel.map((r,i)=><tr key={i} style={{borderTop:"1px solid var(--border)"}}>
          <td className="p-1.5 font-medium">{r[0]}</td><td className="p-1.5 mono" style={{color:"var(--success)"}}>{r[1]}</td>
          <td className="p-1.5 text-xs" style={{color:"var(--text2)"}}>{r[2]}</td></tr>)}</tbody>
      </table>
    </Card>
    <Card>
      <h3 className="font-bold mb-2 flex items-center gap-2"><Icon name="flame" size={18} color="var(--warning)"/>Gut training protocol</h3>
      <p className="text-sm" style={{color:"var(--text2)"}}>Start with <b style={{color:"var(--text)"}}>30 g/hr</b> on your first long ride. Add <b style={{color:"var(--text)"}}>10 g/hr</b> each subsequent long ride until you reach <b style={{color:"var(--text)"}}>60–80 g/hr</b>. Your gut adapts to absorb more — it takes 3–4 weeks of practice. Practice this on ALL long rides; your gut needs training too.</p>
    </Card>
    <Card>
      <h3 className="font-bold mb-2 flex items-center gap-2"><Icon name="droplet" size={18} color="var(--accent)"/>Electrolytes</h3>
      <p className="text-sm" style={{color:"var(--text2)"}}>September in BC can be warm. Add electrolytes (Nuun tabs, Precision Hydration, or a pinch of salt + honey in a bottle) on any ride over 2 hrs. Aim 500–750 ml fluid per hour.</p>
    </Card>
  </div>;
}

/* ============================== SETTINGS / ONBOARD ============================== */
function SettingsModal({settings,setSettings,activities,onClose}){
  const [s,setS]=useState(settings);
  function save(){setSettings({...s,onboarded:true});onClose();}
  function exportCSV(){
    const cols=["date","type","durationMinutes","distanceKm","elevationM","avgHR","maxHR","perceivedEffort","z1","z2","z3","z4","z5","fromStrava","notes","completedPlanWorkout"];
    const rows=activities.map(a=>{const z=a.zoneDistribution||{};return cols.map(c=>{
      let v= c in z?z[c]: a[c]; if(["z1","z2","z3","z4","z5"].includes(c)) v=z[c]??"";
      v=(v??"").toString().replace(/"/g,'""'); return /[",\n]/.test(v)?'"'+v+'"':v;}).join(",");});
    const csv=cols.join(",")+"\n"+rows.join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="granfondo-training-log.csv";a.click();URL.revokeObjectURL(url);
  }
  function resetAll(){if(confirm("Delete ALL data (activities, milestones, notes)? This cannot be undone.")){
    ["activities","milestones","weekly-notes","completed-workouts","gear-status","race-checklist","settings"].forEach(k=>localStorage.removeItem(k));
    location.reload();}}
  return <Modal onClose={onClose}>
    <div className="p-5 space-y-4">
      <div className="flex items-center justify-between">
        <h3 className="text-lg font-bold">Settings</h3>
        <button onClick={onClose} className="btn btn-outline p-1.5"><Icon name="x" size={18}/></button>
      </div>
      <Field label="Name"><input value={s.name} onChange={e=>setS({...s,name:e.target.value})} className="w-full px-3 py-2"/></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Weight (kg)"><input type="number" value={s.weightKg} onChange={e=>setS({...s,weightKg:Number(e.target.value)})} className="w-full px-3 py-2"/></Field>
        <Field label="Max HR (bpm)"><input type="number" value={s.maxHR} onChange={e=>setS({...s,maxHR:Number(e.target.value)})} className="w-full px-3 py-2"/></Field>
      </div>
      <div className="p-3 rounded-lg text-xs" style={{background:"#0f1117",color:"var(--text2)"}}>
        <b style={{color:"var(--text)"}}>HR max test (optional, after 2 weeks):</b> Warm up 15 min → 3×3 min hard on the spin bike (2 min rest) → final effort all-out 60 sec. The highest HR you see = your max. Update it above and all zones recalculate.
      </div>
      <div className="flex flex-col gap-2">
        <button onClick={exportCSV} className="btn btn-outline py-2 flex items-center justify-center gap-2"><Icon name="download" size={16}/>Export training log (CSV)</button>
        <button onClick={save} className="btn btn-primary py-2">Save settings</button>
        <button onClick={resetAll} className="btn btn-outline py-2 text-sm" style={{color:"var(--danger)",borderColor:"var(--danger)"}}>Reset all data</button>
      </div>
    </div>
  </Modal>;
}
function Onboard({onClose}){
  return <Modal onClose={onClose}>
    <div className="p-6 text-center space-y-3">
      <div className="w-14 h-14 rounded-2xl mx-auto flex items-center justify-center" style={{background:"var(--accent)"}}><Icon name="bike" size={30} color="#fff"/></div>
      <h3 className="text-xl font-bold">Welcome, Sam 🚵</h3>
      <p className="text-sm" style={{color:"var(--text2)"}}>This is your single reference for the 13-week build toward the <b style={{color:"var(--text)"}}>RBC GranFondo Whistler</b> on Sept 12, 2026. Open it daily: it tells you exactly what to do, tracks your weeks, and logs your rides.</p>
      <div className="p-3 rounded-lg text-sm text-left" style={{background:"#0f1117"}}>
        <div className="flex justify-between"><span style={{color:"var(--text2)"}}>Training starts</span><span className="mono">Mon, Jun 15 2026</span></div>
        <div className="flex justify-between"><span style={{color:"var(--text2)"}}>Race day</span><span className="mono">Sat, Sep 12 2026</span></div>
        <div className="flex justify-between"><span style={{color:"var(--text2)"}}>Goal</span><span className="mono">122 km · sub-4:00</span></div>
      </div>
      <p className="text-xs" style={{color:"var(--text2)"}}>The plan: 80/20 polarized training. 80% easy (Z1–Z2), 20% hard (Z4–Z5). Avoid the grey zone. Your MTB base is your superpower — we're closing the gaps: sustained output, pacing, fueling, road position.</p>
      <button onClick={onClose} className="btn btn-primary w-full py-2.5">Let's go →</button>
    </div>
  </Modal>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
